apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: deer-flow
  labels:
    app: deer-flow
    component: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      component: frontend
  template:
    metadata:
      labels:
        app: deer-flow
        component: frontend
    spec:
      containers:
        - name: frontend
          image: deer-flow-frontend:latest  # Build and push to your registry
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: deer-flow
spec:
  selector:
    component: frontend
  ports:
    - port: 3000
      targetPort: 3000
